[analysis]
provider = "yahoo"
tickers = ["SPY", "QQQ", "TLT", "GLD"]
start_date = "2020-01-01"
end_date = "2025-01-01"
rolling_window = 21
rolling_min_observations = 21
observations_per_year = 252
output_dir = "outputs"

# For an offline run, set provider = "csv" and provide a canonical file:
# csv_path = "data/adjusted_prices.csv"
