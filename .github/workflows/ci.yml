name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package and development tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Check formatting
        run: python -m ruff format --check .
      - name: Lint
        run: python -m ruff check .
      - name: Type check
        run: python -m mypy
      - name: Test
        run: python -m pytest -q

  clean-package-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Build source and wheel distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Install wheel into a clean environment
        shell: bash
        run: |
          python -m venv "$RUNNER_TEMP/market-risk-clean"
          "$RUNNER_TEMP/market-risk-clean/bin/python" -m pip install dist/*.whl
          cd "$RUNNER_TEMP"
          "$RUNNER_TEMP/market-risk-clean/bin/python" -c "import market_risk_baseline; assert market_risk_baseline.__version__ == '0.2.1'"
          "$RUNNER_TEMP/market-risk-clean/bin/market-risk-baseline" --help
